# Mudan reservoir survey
grid:
  epsg: 3826
  resolution: 0.5
  bounds:
    left: 227173.5
    right: 228429.5
    bottom: 2448218.0
    top: 2449210.5

environment:
  sound_speed: 1489.073    # fresh water at 25°C

mbes:
  source: data/multibeam/G1m_142m.txt
  bathymetry_tif: outputs/tif/mbes_bathymetry.tif
  vrm_tif: outputs/tif/mbes_vrm.tif

sss:
  channels: [HF_port, HF_stbd]    # swap to [LF_port, LF_stbd] for LF

  survey_dirs:
    - path: data/sss/20251223
      cable_length: 15.0
    - path: data/sss/20251224
      cable_length: null

  outputs:
    bs_tif: outputs/tif/sss_backscatter_hf.tif
    lbl_tif: outputs/tif/sss_clusters_hf.tif
    validation_dir: outputs/sss_validation

  cluster:
    method: kmeans
    k_init: 7

sbp:
  # Calibration coefficient (run calibrate_sbp_cc.py to estimate)
  calibration_constant: 3.7134e+04

  survey_dirs:
     - path: data/sbp

  outputs:
    rl_tif: outputs/tif/sbp_rl.tif
    sediment_tif: outputs/tif/sbp_sediment_class.tif
    confidence_tif: outputs/tif/sbp_confidence.tif
    isopach_tif: outputs/tif/sbp_isopach.tif

mag:
  survey_dirs:
    - { path: "data/mag/20251223", date: "2025-12-23" }
    - { path: "data/mag/20260108", date: "2026-01-08" }
  igrf_center:
    lat: 22.137
    lon: 120.787
  layback_m: 10
  outputs:
    background_tif: outputs/tif/mag_background.tif
    residual_tif:   outputs/tif/mag_residual.tif
    anomaly_tif:    outputs/tif/mag_anomaly.tif
    confidence_tif: outputs/tif/mag_confidence.tif
    targets_csv:    outputs/csv/mag_targets.csv 


cube:
  reference_grid: outputs/tif/mbes_bathymetry.tif    # which layer defines the grid
  output: outputs/hydrospatial_datacube.nc
  layers:
    - { var: bathymetry,     path: outputs/tif/mbes_bathymetry.tif,      units: "m",  dtype: float32, kind: continuous,  desc: "Water depth (positive down)" }
    - { var: vrm,            path: outputs/tif/mbes_vrm.tif,             units: "",   dtype: float32, kind: continuous,  desc: "Vector ruggedness measure" }
    - { var: bs_lf,          path: outputs/tif/sss_backscatter_lf.tif,   units: "dB", dtype: float32, kind: continuous,  desc: "SSS backscatter, 230 kHz (LF)" }
    - { var: bs_hf,          path: outputs/tif/sss_backscatter_hf.tif,   units: "dB", dtype: float32, kind: continuous,  desc: "SSS backscatter, 850 kHz (HF)" }
    - { var: rl,             path: outputs/tif/sbp_rl.tif,               units: "dB", dtype: float32, kind: continuous,  desc: "Reflection loss" }
    - { var: sediment_class, path: outputs/tif/sbp_sediment_class.tif,   units: "",   dtype: int8,    kind: categorical, desc: "Hamilton sediment classification" }
    - { var: mag_anomaly,    path: outputs/tif/mag_anomaly.tif,          units: "nT", dtype: float32, kind: continuous,  desc: "Magnetic anomaly (F - IGRF)" }

viewer:
  netcdf: outputs/hydrospatial_datacube.nc
  tracklines: outputs/tracklines.json
  waterfalls_dir: outputs/waterfalls
  static_dir: src/viewer
  sediment_rgb_tif: outputs/tif/sbp_sediment_rgb.tif
  contours: src/viewer/static/contours_bathymetry.geojson

  tile_layers:
    - { id: bathymetry,     path: outputs/tif/mbes_bathymetry.tif,      label: "Bathymetry",          palette: turbo_r }
    - { id: imagery_hf,     path: outputs/tif/sss_backscatter_hf.tif,   label: "SSS Backscatter",     palette: copper }
    - { id: sediment_class, path: outputs/tif/sbp_sediment_rgb.tif,     label: "Sediment Class",      palette: null }
    - { id: mag_anomaly,    path: outputs/tif/mag_anomaly.tif,          label: "Magnetic Anomaly",    palette: rdbu }