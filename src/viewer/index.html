<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hydrospatial Data Cube</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://rawcdn.githack.com/turban/Leaflet.Graticule/master/L.Graticule.js"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-minimap@3.6.1/dist/Control.MiniMap.min.css"
    />
    <script src="https://unpkg.com/leaflet-minimap@3.6.1/dist/Control.MiniMap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { DEFAULT: "#2563eb", accent: "#F57D15", teal: "#1D728A" },
            },
            fontFamily: {
              sans: ['"Noto Sans TC"', "sans-serif"],
              mono: ['"Roboto Mono"', "monospace"],
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="/viewer/style.css" />
  </head>

  <body
    class="fixed inset-0 overflow-hidden bg-slate-50 text-slate-800 font-sans select-none"
  >
    <aside
      id="sidebar"
      class="absolute top-0 left-0 bottom-0 w-[320px] flex flex-col bg-slate-50 border-r border-slate-200 shadow-[4px_0_24px_rgba(0,0,0,0.05)] z-[1500] transition-transform duration-300 ease-in-out transform translate-x-0"
    >
      <button
        id="btn-toggle-sidebar"
        class="absolute top-1/2 -right-5 -translate-y-1/2 w-5 h-16 bg-white border border-l-0 border-slate-200 rounded-r-md shadow-[4px_0_10px_rgba(0,0,0,0.05)] flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-colors z-[1501] outline-none"
      >
        <svg
          id="sidebar-chevron"
          class="w-3 h-3"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="3"
            d="M15 19l-7-7 7-7"
          ></path>
        </svg>
      </button>

      <header class="p-5 bg-white border-b border-slate-200 shrink-0">
        <h1 class="text-lg font-bold tracking-tight text-slate-900 mb-2">
          Hydrospatial Cube
        </h1>
        <select
          class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-sm font-medium rounded-lg p-2 shadow-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 cursor-pointer hover:bg-white transition-colors"
        >
          <option value="mudan">Mudan Reservoir Survey</option>
        </select>
      </header>

      <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
        <section
          class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm"
        >
          <h2
            class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-1.5"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7c-2 0-3 1-3 3z"
              ></path>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 12h16"
              ></path>
            </svg>
            Data Layers
          </h2>
          <nav class="flex flex-col gap-1.5">
            <button
              class="layer-btn active flex items-center justify-between px-3 py-2 text-sm rounded-lg bg-slate-800 text-white font-bold transition-all shadow-md"
              data-layer="bathymetry"
            >
              <span>Bathymetry</span>
              <svg
                class="check-icon w-4 h-4 text-blue-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="3"
                  d="M5 13l4 4L19 7"
                ></path>
              </svg>
            </button>

            <button
              class="layer-btn flex items-center justify-between px-3 py-2 text-sm rounded-lg text-slate-600 hover:bg-slate-100 font-medium transition-all"
              data-layer="imagery_hf"
            >
              <span>SSS Imagery</span>
              <svg
                class="check-icon w-4 h-4 text-blue-400 hidden"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="3"
                  d="M5 13l4 4L19 7"
                ></path>
              </svg>
            </button>

            <button
              class="layer-btn flex items-center justify-between px-3 py-2 text-sm rounded-lg text-slate-600 hover:bg-slate-100 font-medium transition-all"
              data-layer="sediment_class"
            >
              <span>Sediment Class</span>
              <svg
                class="check-icon w-4 h-4 text-blue-400 hidden"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="3"
                  d="M5 13l4 4L19 7"
                ></path>
              </svg>
            </button>

            <button
              class="layer-btn flex items-center justify-between px-3 py-2 text-sm rounded-lg text-slate-600 hover:bg-slate-100 font-medium transition-all"
              data-layer="mag_anomaly"
            >
              <span>Magnetic Residual</span>
              <svg
                class="check-icon w-4 h-4 text-blue-400 hidden"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="3"
                  d="M5 13l4 4L19 7"
                ></path>
              </svg>
            </button>
          </nav>

          <div class="mt-4 pt-3 border-t border-slate-100 flex flex-col gap-2">
            <div class="flex justify-between items-center">
              <label class="text-[11px] font-bold text-slate-500"
                >Opacity</label
              >
              <span class="text-[10px] font-mono text-slate-400"></span>
            </div>
            <input
              type="range"
              id="opacity-slider"
              class="w-full cursor-pointer"
              min="0"
              max="100"
              value="100"
            />
          </div>
        </section>

        <section
          class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm"
        >
          <h2
            class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-1.5"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"
              ></path>
            </svg>
            Display Settings
          </h2>

          <div class="space-y-4">
            <label class="flex items-center justify-between cursor-pointer group">
            <span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors">Contour Lines</span>
            <div class="relative inline-flex items-center">
              <input type="checkbox" id="chk-contours" class="sr-only peer" checked>
              <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-500"></div>
            </div>
          </label>
            </label>

            <label
              class="flex items-center justify-between cursor-pointer group"
            >
              <span
                class="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors"
                >Tracklines (SSS)</span
              >
              <div class="relative inline-flex items-center">
                <input
                  type="checkbox"
                  id="chk-trackline-sss"
                  class="sr-only peer"
                />
                <div
                  class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"
                ></div>
              </div>
            </label>

            <label
              class="flex items-center justify-between cursor-pointer group"
            >
              <span
                class="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors"
                >Tracklines (SBP)</span
              >
              <div class="relative inline-flex items-center">
                <input
                  type="checkbox"
                  id="chk-trackline-sbp"
                  class="sr-only peer"
                />
                <div
                  class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-pink-500"
                ></div>
              </div>
            </label>
          </div>
        </section>
      </div>
    </aside>

    <main
      id="map-wrapper"
      class="absolute top-0 left-[320px] right-0 bottom-0 transition-all duration-300 ease-in-out bg-slate-100"
    >
      <nav
        class="absolute top-6 left-1/2 -translate-x-1/2 z-[1000] bg-white/95 backdrop-blur-md border border-slate-200 rounded-full shadow-lg p-1 flex items-center gap-1 select-none"
      >
        <div class="flex items-center gap-1">
          <button
            id="btn-tool-pan"
            data-tool="pan"
            class="tool-btn active p-2 rounded-full transition-all text-white bg-blue-600 shadow-md"
            title="拖曳地圖 (Pan)"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0m-3 6a1.5 1.5 0 00-3 0v2a7.5 7.5 0 0015 0v-5a1.5 1.5 0 00-3 0m-6-3V11m0-5.5v-1a1.5 1.5 0 013 0v1m0 0V11m0-5.5a1.5 1.5 0 013 0v3m0 0V11"
              ></path>
            </svg>
          </button>
          <button
            id="btn-tool-query"
            data-tool="query"
            class="tool-btn p-2 rounded-full transition-all text-slate-500 hover:text-slate-800 hover:bg-slate-100"
            title="單點數據查詢 (Point Query)"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
              ></path>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
              ></path>
            </svg>
          </button>
          <button
            id="btn-tool-line"
            data-tool="line"
            class="tool-btn p-2 rounded-full transition-all text-slate-500 hover:text-slate-800 hover:bg-slate-100"
            title="繪製剖面線 (Profile Line)"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
              ></path>
            </svg>
          </button>
          <button
            id="btn-tool-select"
            data-tool="select"
            class="tool-btn p-2 rounded-full transition-all text-slate-500 hover:text-slate-800 hover:bg-slate-100"
            title="框選 3D 地塊 (Region 3D)"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"
              ></path>
            </svg>
          </button>
        </div>
        <div class="w-[1px] h-6 bg-slate-200 mx-2"></div>
        <div class="flex items-center">
          <button
            id="btn-reset"
            class="p-2 rounded-full transition-all text-slate-400 hover:text-rose-600 hover:bg-rose-50"
            title="重置畫面與清除視窗 (Reset)"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
              ></path>
            </svg>
          </button>
        </div>
      </nav>

      <div id="map" class="w-full h-full z-10"></div>
      <div
        id="coord-display"
        class="absolute bottom-4 left-4 z-[1000] bg-white/90 border border-slate-200 text-slate-700 text-xs px-3 py-1.5 rounded-md shadow-sm pointer-events-none font-mono select-text"
      >
        —
      </div>
    </main>

    <section
      id="bottom-panel"
      class="absolute bottom-0 left-[320px] right-0 bg-white border-t border-slate-200 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-[1800] flex flex-col transition-transform duration-300 ease-in-out transform translate-y-full overflow-hidden"
      style="height: 0px"
    >
      <div
        id="bp-resizer"
        class="absolute top-0 left-0 right-0 h-1.5 cursor-row-resize bg-transparent hover:bg-blue-400 z-50 transition-colors"
      ></div>
      <header
        class="flex justify-between items-center px-5 py-2 border-b border-slate-200 bg-slate-50 shrink-0"
      >
        <div class="flex items-center gap-3">
          <span id="bp-title" class="font-bold text-slate-800 text-sm"
            >Inspector</span
          >
          <span
            id="bp-info-text"
            class="text-xs font-mono text-orange-600 font-bold ml-4"
          ></span>
        </div>
        <button
          onclick="closePanels()"
          class="text-slate-400 hover:text-red-500 transition-colors text-2xl leading-none px-2"
        >
          &times;
        </button>
      </header>
      <div class="flex-1 flex flex-col overflow-hidden min-h-0">
        <div
          id="bp-top-section"
          class="relative w-full shrink-0 flex flex-col pt-2"
          style="height: 200px"
        >
          <div id="bp-echarts-container" class="flex-1 w-full"></div>
          <div
            id="bp-echarts-cursor"
            class="absolute top-[30px] bottom-[20px] w-[2px] bg-orange-500 pointer-events-none hidden z-50"
          ></div>
          <input
            type="range"
            id="bp-slider"
            class="w-[calc(100%-80px)] mx-[40px] mt-1 cursor-pointer z-50 shrink-0"
            min="0"
            max="100"
            value="0"
          />
        </div>
        <div
          id="bp-internal-resizer"
          class="w-full h-1.5 cursor-row-resize bg-slate-200 hover:bg-blue-400 shrink-0 my-1 hidden transition-colors"
        ></div>
        <div
          id="bp-sbp-section"
          class="w-full relative hidden flex-1 min-h-[100px] overflow-hidden pb-3"
        >
          <div
            class="text-[11px] font-bold text-slate-400 mb-1 pl-[40px] shrink-0"
          >
            SBP Envelope Image
          </div>
          <div
            class="relative w-[calc(100%-80px)] mx-[40px] h-[calc(100%-20px)] bg-black rounded shadow-sm overflow-hidden border border-slate-300"
          >
            <img
              id="bp-sbp-image"
              class="w-full h-full object-fill block"
              src=""
            />
            <div
              id="bp-sbp-cursor"
              class="absolute top-0 bottom-0 w-[2px] bg-orange-500 pointer-events-none hidden z-50"
            ></div>
          </div>
        </div>
      </div>
    </section>

    <section
      id="right-panel"
      class="absolute top-0 right-0 bottom-0 bg-white border-l border-slate-200 shadow-[-10px_0_40px_rgba(0,0,0,0.1)] z-[1900] flex flex-col transition-transform duration-300 ease-in-out transform translate-x-full overflow-hidden"
      style="width: 0px"
    >
      <div
        id="rp-resizer"
        class="absolute top-0 bottom-0 left-0 w-1.5 cursor-col-resize bg-transparent hover:bg-blue-400 z-50 transition-colors"
      ></div>
      <header
        class="flex justify-between items-center px-5 py-3 border-b border-slate-200 bg-slate-50 shrink-0"
      >
        <span id="rp-title" class="font-bold text-slate-800 text-sm"
          >SSS Viewer</span
        >
        <button
          onclick="closePanels()"
          class="text-slate-400 hover:text-red-500 transition-colors text-2xl leading-none px-2"
        >
          &times;
        </button>
      </header>
      <div class="flex-1 flex flex-col overflow-hidden min-h-0">
        <div
          id="rp-top-section"
          class="relative w-full shrink-0 flex flex-col px-4 pt-2"
          style="height: 200px"
        >
          <div class="flex justify-between items-center mb-1 shrink-0">
            <span
              id="rp-info-text"
              class="text-[11px] font-mono text-orange-600 font-bold"
            ></span>
          </div>
          <div id="rp-echarts-container" class="flex-1 w-full relative"></div>
          <div
            id="rp-echarts-cursor"
            class="absolute top-[30px] bottom-[20px] w-[2px] bg-orange-500 pointer-events-none hidden z-50 shadow-md"
          ></div>
          <input
            type="range"
            id="rp-slider"
            class="w-[calc(100%-60px)] mx-[30px] mt-1 cursor-pointer relative z-50 shrink-0"
            min="0"
            max="100"
            value="0"
          />
        </div>
        <div
          id="rp-internal-resizer"
          class="w-full h-1.5 cursor-row-resize bg-slate-200 hover:bg-blue-400 shrink-0 my-1 transition-colors"
        ></div>
        <div
          id="rp-images"
          class="flex-1 p-4 overflow-y-auto bg-slate-100 flex gap-4"
        >
          <div id="sss-hf-container" class="flex-1 relative hidden">
            <div
              class="relative rounded shadow-sm bg-black overflow-hidden border border-slate-300"
            >
              <img id="img-hf" class="w-full h-auto block" src="" />
              <div
                class="wf-redline absolute left-0 right-0 h-[2px] bg-orange-500 top-0 pointer-events-none"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <dialog
      id="modal-3d"
      class="hidden fixed inset-0 z-[9999] bg-black/80 flex items-center justify-center backdrop-blur-sm w-full h-full m-0 max-w-none bg-transparent"
    >
      <div
        class="relative w-[90vw] h-[85vh] bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-700"
      >
        <header
          class="absolute top-0 left-0 right-0 h-12 bg-slate-800/90 flex justify-between items-center px-4 z-10 border-b border-slate-700"
        >
          <h3 class="text-white font-bold tracking-wide">3D 地層解剖視圖</h3>
          <button
            onclick="window.close3D()"
            class="text-slate-400 hover:text-white text-2xl font-bold p-2 transition-colors"
            title="關閉 (Esc)"
          >
            &times;
          </button>
        </header>
        <div id="canvas-container-3d" class="w-full h-full"></div>
        <div
          id="loading-3d"
          class="absolute inset-0 flex items-center justify-center text-white bg-slate-900 z-20"
        >
          <div class="animate-pulse flex flex-col items-center">
            <span class="text-4xl mb-2">🧊</span>
            <span class="text-slate-300 font-bold"
              >正在生成 3D 網格資料...</span
            >
          </div>
        </div>
      </div>
    </dialog>

    <dialog
      id="modal-borehole"
      class="hidden fixed inset-0 z-[9999] bg-black/85 flex items-center justify-center backdrop-blur-sm w-full h-full m-0 max-w-none bg-transparent"
    >
      <div
        class="relative w-[400px] h-[80vh] bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-700 flex flex-col"
        onclick="event.stopPropagation()"
      >
        <header
          class="relative h-12 bg-slate-800/90 flex justify-between items-center px-4 z-[50] border-b border-slate-700 shrink-0"
        >
          <h3
            id="borehole-title"
            class="text-white font-bold text-sm tracking-wide flex items-center gap-2"
          >
            <svg
              class="w-4 h-4 text-orange-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
